kind = "web"
previewPath = "/"
title = "Hostel Mess Manager"
version = "1.0.0"
id = "artifacts/mess-attendance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22582

[services.development]
run = "pnpm --filter @workspace/mess-attendance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mess-attendance", "run", "build" ]
publicDir = "artifacts/mess-attendance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22582"
BASE_PATH = "/"
